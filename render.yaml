databases:
  - name: app-igreja-db
    databaseName: app_igreja
    user: app_igreja_user
    plan: free

services:
  - type: web
    name: app-igreja-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install; npm run prisma:generate; npm run build
    startCommand: npm run prisma:deploy; npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: app-igreja-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production
